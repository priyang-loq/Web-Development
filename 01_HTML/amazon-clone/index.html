<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAZON-Home-Page-clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <header>
        <div class="top-nav">
            <a href="index.html"><img src="images/amazon-log.png" alt="amazon logo"></a>

            <nav>
                <div class="nav-location">
                    <span class="nav-line-1">Deliver to</span>
                    <div class="nav-location-container">
                        <span class="nav-icon"><i class="fa-solid fa-location-dot"></i></span>
                        <span class="nav-line-2">Guwahati 781001</span>
                    </div>
                </div>
                <div class="nav-search-bar">
                    <form class="search-bar" action="#" method="GET">

                        <select class="search-dropdown">
                            <option>All</option>
                            <option>Electronics</option>
                            <option>Books</option>
                        </select>


                        <input type="text" placeholder="Search..." name="q" class="search-input">


                        <button type="submit" class="search-button">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </form>
                </div>
                <div class="nav-lang">
                    <form class="language-select" action="/language">
                        <select name="language" class="language">
                            <option value="ENGLISH">ENGLISH-EN</option>
                            <option value="HINDI">HINDI-HI</option>
                            <option value="ASSAMESE">ASSAMESE-AS</option>
                        </select>
                    </form>
                </div>
                <div class="nav-login">
                    <a href="singin.html" target="_blank">Hello, Sign in
                        Account & Lists</a>
                </div>
                <div class="nav-order">
                    <a href="orders.html" target="_blank"><span>Returns</span><br><span>&amp; Orders</span></a>
                </div>
                <div class="nav-cart">
                    <a href="cart.html" target="_blank"><i class="fa-solid fa-cart-shopping"></i>
                        <span>Cart</span></a>
                </div>
            </nav>
        </div>
    </header>
</body>

</html>
