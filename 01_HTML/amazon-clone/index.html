<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAZON-Home-Page-clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>
    <header>
        <div class="top-nav">
            <a class="nav-logo" href="index.html"><img src="images/Amazon-Logo-White-PNG.png" alt="amazon logo"
                    width="110" height="40"></a>


            <div class="nav-location">
                <span class="nav-line-1">Deliver to</span>
                <div class="nav-location-container">
                    <span class="nav-icon"><i class="fa-solid fa-location-dot"></i></span>
                    <span class="nav-line-2">Guwahati 781001</span>
                </div>
            </div>
            <div class="nav-search-bar">
                <form class="search-bar" action="#">

                    <select class="search-dropdown">
                        <option>All</option>
                        <option>Electronics</option>
                        <option>Books</option>
                    </select>


                    <input type="text" placeholder="Search Amazon.in" name="q" class="search-input">


                    <button type="submit" class="search-button">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </div>
            <div class="nav-lang">
                <form class="language-select" action="/language">
                    <select name="language" class="language">
                        <option value="ENGLISH">🇮🇳 EN</option>
                        <option value="HINDI">हिन्दी</option>
                        <option value="ASSAMESE">অসমীয়া</option>
                    </select>
                </form>
            </div>
            <div class="nav-login">
                <a href="singin.html" target="_blank"> <span class="small-text">
                        Hello,PRIYANG<br> Sign in
                    </span>

                    <span class="large-text">
                        Account & Lists
                    </span></a>
            </div>
            <div class="nav-orders">
                <a href="orders.html" target="_blank"><span class="small-text">Returns</span><span
                        class="large-text">&amp; Orders</span></a>
            </div>
            <div class="nav-cart">
                <a href="cart.html" target="_blank"><i class="fa-solid fa-cart-shopping"></i>
                    <span>Cart</span></a>
            </div>

        </div>
        <div class="panel">

            <div class="panel-all">
                <i class="fa-solid fa-bars"></i>
                <span>All</span>
            </div>

            <div class="panel-links">

                <a href="#">Rufus</a>
                <a href="#">MX Player</a>
                <a href="#">Sell</a>
                <a href="#">Amazon Pay</a>
                <a href="#">Gift Cards</a>
                <a href="#">Gift Ideas</a>
                <a href="#">Buy Again</a>
                <a href="#">Amazon Basics</a>
                <a href="#">Subscribe &amp; Save</a>

                <select class="browsing">
                    <option>Browsing History</option>
                </select>

            </div>

        </div>
    </header>
</body>

</html>
