<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables Practice</title>
</head>
<body>
    <h1>HTML Tables Practice</h1>

    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>Weight</th>
                <th>Price (₹)</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Apples</td>
                <td>1 kg</td>
                <td>200</td>
            </tr>

            <tr>
                <td>Rice</td>
                <td>5 kg</td>
                <td>400</td>
            </tr>

            <tr>
                <td>Potatoes</td>
                <td>2 kg</td>
                <td>80</td>
            </tr>

            <tr>
                <td>Milk</td>
                <td>1 L</td>
                <td>60</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
